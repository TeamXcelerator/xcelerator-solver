# Example 4 — Pinned Terms
#
# Target formula: y = ln(x) + 2
# Demonstrates pinned_terms: every accepted candidate MUST contain ln(x)
# as a sub-expression. This focuses the search when domain knowledge
# indicates a specific structure must appear in the formula.
#
# With pinned_terms = ["ln(x)"], any formula that does not contain
# ln(x) as a sub-tree is discarded regardless of its error.
#
# Run from this directory:
#   xcelerator-solver solver.toml

training_csv   = "data/train.csv"
validation_csv = "data/val.csv"
target_column  = "y"

max_error_pct  = 1.0
max_complexity = 5
max_time_secs  = 15.0
output_file    = "results.txt"
top_candidates = 10
max_threads    = 4

# Every accepted candidate must contain ln(x) as a sub-tree.
pinned_terms = ["ln(x)"]

[terms]
variables = ["x"]
constants = ["2"]

[operators]
binary = ["add"]
unary  = ["ln"]
